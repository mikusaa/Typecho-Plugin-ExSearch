name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build
        run: |
          npm ci
          npx gulp

      - name: Pack Artifact
        run: |
          cd build
          zip -r ../ExSearch-${GITHUB_REF_NAME}.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ExSearch ${{ github.ref_name }}
          files: ExSearch-${{ github.ref_name }}.zip
          generate_release_notes: true
